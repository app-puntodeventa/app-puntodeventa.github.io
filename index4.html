<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>POS v4 limpio</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

</head>

<body class="bg-gray-100">

<!-- LOGIN -->
<div id="loginScreen" class="fixed inset-0 flex items-center justify-center bg-black">
  <div class="bg-white p-6 rounded w-72">
    <h2 class="font-bold mb-2">Login POS v4</h2>

    <input id="pinInput" type="password" class="border w-full p-2 mb-2" placeholder="PIN">

    <button id="btnLogin" class="bg-blue-600 text-white w-full py-2">
      Entrar
    </button>
  </div>
</div>

<!-- HEADER -->
<header class="p-3 bg-blue-600 text-white flex justify-between">
  <div>POS v4</div>
  <div id="userLabel"></div>
</header>

<!-- INPUT VENTA -->
<div class="p-3 flex gap-2">
  <input id="saleInput" class="border p-2 w-full" placeholder="Ej: 2 cuadernos 25">
  <button id="btnAdd" class="bg-green-600 text-white px-4">+</button>
</div>

<!-- PREVENTA -->
<div id="preSale" class="p-3 space-y-2"></div>

<div class="p-3 flex justify-between">
  <div>Total: <span id="total">$0</span></div>
  <button id="btnFinish" class="bg-red-500 text-white px-4 py-1">
    Finalizar
  </button>
</div>

<!-- HISTORIAL -->
<div id="history" class="p-3 space-y-2"></div>

<!-- EXCEL -->
<div class="p-3">
  <input type="file" id="fileExcel">
  <button id="exportExcel">Exportar Excel</button>
</div>

<script src="storage4.js"></script>
<script src="auth4.js"></script>
<script src="inventory4.js"></script>
<script src="sales4.js"></script>
<script src="excel4.js"></script>
<script src="app4.js"></script>

</body>
</html>
