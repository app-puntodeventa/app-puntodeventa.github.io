<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>POS Tienda (Demo)</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<meta name="theme-color" content="#111827">
</head>

<body class="bg-gray-100 min-h-screen flex flex-col">

<!-- HEADER -->
<header class="flex justify-between items-center bg-blue-600 text-white p-3 shadow">

  <div class="font-bold text-lg">
    APP Punto de venta (Demo)
  </div>

  <div id="userLabel" class="text-sm opacity-90">
    Modo Demo
  </div>

  <div class="flex gap-2">
    <!-- Quitado botón instalar -->
    
    <!-- (Opcional) puedes quitar también logout si no lo necesitas -->
    <button id="btnLogout" class="bg-red-500 px-3 py-1 rounded text-sm">
      Reiniciar
    </button>
  </div>

</header>

<div class="p-4 flex gap-2">
  <button id="btnNuevaVenta"
    class="bg-green-600 text-white px-4 py-2 rounded">
    Nueva venta
  </button>
</div>

<!-- VENTAS -->
<div id="listaVentas" class="p-4 grid gap-4"></div>

<!-- FOOTER -->
<div class="p-4 bg-white shadow-inner flex flex-col gap-3">

  <div class="flex justify-between items-center">
    <div>
      <p class="text-sm text-gray-500">Total del día</p>
      <p id="totalDia" class="text-xl font-bold text-blue-600">$0</p>
    </div>
  </div>

  <div class="flex gap-2">
    <button id="btnPDF"
      class="bg-black text-white px-4 py-2 rounded text-sm">
      📄 PDF
    </button>

    <button id="btnPDFGlobal"
      class="bg-red-600 text-white px-4 py-2 rounded text-sm font-bold shadow-lg"
      style="display:none;">
      📊 PDF GLOBAL
    </button>
  </div>

</div>

<!-- MODAL -->
<dialog id="modal" class="p-6 rounded-xl w-96 relative">

  <button id="btnCerrar" class="absolute right-3 top-2">✕</button>

  <h2 class="font-bold mb-2">Venta</h2>

  <div class="flex gap-2">
    <input id="inputProducto"
      class="border p-2 w-full"
      placeholder="Ej: 2 cuadernos de 25 | 3 hojas 1 peso">

    <button id="btnAdd"
      class="bg-green-500 text-white px-3 rounded md:hidden">
      ➤
    </button>
  </div>

  <p id="preview" class="text-blue-500 text-sm mt-1"></p>

  <div id="preVenta" class="mt-3 space-y-2"></div>

  <p class="mt-3">Total: <span id="totalVenta">$0</span></p>

  <button id="btnFinalizar"
    class="bg-red-500 text-white w-full mt-3 py-2 rounded">
    Finalizar venta
  </button>

</dialog>

<script src="app2.js"></script>

</body>
</html>
