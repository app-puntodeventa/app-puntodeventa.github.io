<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ganancias</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>

<body class="bg-gray-100 min-h-screen">

<!-- HEADER -->
<header class="flex justify-between items-center bg-purple-600 text-white p-3 shadow">

  <div class="font-bold text-lg flex items-center gap-2">
    <i class="bi bi-graph-up-arrow"></i>
    Ganancias del día
  </div>

  <a href="index5.html"
     class="bg-white text-purple-600 px-3 py-1 rounded text-sm">
    Volver
  </a>

</header>

<!-- RESUMEN -->
<div class="p-4 grid gap-4">

  <!-- CARDS -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-3">

    <div class="bg-white p-4 rounded shadow">
      <p class="text-gray-500 text-sm">Ventas totales</p>
      <p id="totalVentas" class="text-2xl font-bold">$0</p>
    </div>

    <div class="bg-white p-4 rounded shadow">
      <p class="text-gray-500 text-sm">Costo total</p>
      <p id="totalCosto" class="text-2xl font-bold text-red-500">$0</p>
    </div>

    <div class="bg-white p-4 rounded shadow">
      <p class="text-gray-500 text-sm">Ganancia</p>
      <p id="gananciaTotal" class="text-2xl font-bold text-green-600">$0</p>
    </div>

  </div>

  <!-- DETALLE -->
  <div class="bg-white p-4 rounded shadow">

    <h2 class="font-bold mb-2 flex items-center gap-2">
      <i class="bi bi-list-ul"></i>
      Productos con ganancia
    </h2>

    <div id="listaGanancias" class="space-y-2"></div>

  </div>

</div>

<script src="ganancias.js"></script>

</body>
</html>
