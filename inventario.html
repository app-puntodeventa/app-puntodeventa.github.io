<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>POS Pro - Sistema de Ventas</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode.js/1.4.4/qrcode.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111827">

<style>
  * {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }

  /* ==============================
     🔥 RESPONSIVE TABLE FIX (SIN JS)
     ============================== */

  table {
    width: 100%;
    border-collapse: collapse;
  }

  /* Contenedor scroll automático si hay overflow */
  .table-wrapper,
  .table-responsive,
  .overflow-auto {
    max-width: 100%;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  /* Evita que columnas se aplasten */
  th, td {
    white-space: nowrap;
  }

  /* Mejora visual en móvil */
  @media (max-width: 768px) {
    table {
      min-width: 700px; /* clave para activar scroll horizontal */
    }

    th, td {
      font-size: 12px;
      padding: 8px;
    }
  }

  /* ==============================
     TU CSS ORIGINAL (NO TOCADO)
     ============================== */

  #licenseModal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.8);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9999;
  }

  #licenseModal.active {
    display: flex;
  }

  #licenseModalContent {
    background: white;
    padding: 2rem;
    border-radius: 16px;
    max-width: 500px;
    width: 90%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
  }

  #loginScreen {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  }

  .login-card {
    background: white;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    padding: 2.5rem 1.5rem;
    width: 100%;
    max-width: 380px;
  }

  .login-header {
    text-align: center;
    margin-bottom: 2rem;
  }

  .login-header i {
    font-size: 3rem;
    color: #667eea;
    margin-bottom: 0.5rem;
  }

  .login-header h1 {
    font-size: 1.8rem;
    font-weight: 700;
    color: #111827;
    margin: 0;
  }

  .login-header p {
    color: #6b7280;
    margin-top: 0.5rem;
    font-size: 0.9rem;
  }

  .pin-input-group {
    position: relative;
    margin-bottom: 1.5rem;
  }

  .pin-input {
    width: 100%;
    padding: 14px 44px 14px 14px;
    border: 2px solid #e5e7eb;
    border-radius: 10px;
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: 0.3em;
    text-align: center;
    transition: all 0.3s ease;
  }

  .pin-input:focus {
    outline: none;
    border-color: #667eea;
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
  }

  .pin-toggle {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: #9ca3af;
    cursor: pointer;
    font-size: 1.2rem;
  }

  .login-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    border-radius: 10px;
    font-weight: 600;
  }
</style>
</head>

<body class="bg-gray-100 min-h-screen flex flex-col">

<!-- MODAL LICENCIA -->
<div id="licenseModal"></div>

<!-- LOGIN -->
<div id="loginScreen"></div>

<!-- HEADER -->
<header class="bg-gradient-to-r from-blue-600 to-blue-700 text-white p-4 shadow-lg">
  <div class="flex justify-between items-center">
    <div class="font-bold text-lg flex items-center gap-2">
      <i class="bi bi-cash-register"></i> POS Pro
    </div>

    <div id="userLabel">Sin sesión</div>

    <button id="btnLogout" class="bg-red-500 px-3 py-1 rounded text-sm font-bold">
      Salir
    </button>
  </div>
</header>

<!-- BOTONES -->
<div class="bg-white p-3 shadow-md flex gap-2 flex-wrap">
  <button id="btnNuevaVenta" class="bg-green-600 text-white px-4 py-2 rounded font-bold">
    Nueva Venta
  </button>

  <a href="inventario.html" class="bg-blue-600 text-white px-4 py-2 rounded font-bold">
    Inventario
  </a>
</div>

<!-- LISTA -->
<div id="listaVentas" class="p-4"></div>

<!-- FOOTER -->
<div class="bg-white p-4 shadow-lg border-t">
  <p>Total del día: <span id="totalDia">$0</span></p>
</div>

<!-- MODALES Y JS -->
<dialog id="modal"></dialog>
<dialog id="modalCambio"></dialog>
<dialog id="modalComprobante"></dialog>

<script src="parser14.js"></script>
<script src="app14.js"></script>

</body>
</html>
