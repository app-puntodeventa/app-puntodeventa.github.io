<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Inventario Pro - POS</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>
  * {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }

  /* ==============================
     🔥 TABLE RESPONSIVE FIX (REAL)
     ============================== */

  .table-responsive {
    width: 100%;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  table {
    border-collapse: collapse;
    width: 100%;
  }

  /* 🔥 CLAVE: fuerza overflow en móvil */
  @media (max-width: 768px) {
    table {
      min-width: 800px;
    }

    th, td {
      white-space: nowrap;
      font-size: 12px;
      padding: 10px 8px;
    }

    thead {
      position: sticky;
      top: 0;
      z-index: 5;
    }
  }

  /* ==============================
     TU CSS ORIGINAL (SIN CAMBIOS)
     ============================== */

  .edit-mode input, .edit-mode select {
    background: #fef3c7;
    border: 2px solid #f59e0b;
  }

  .edit-mode input:focus, .edit-mode select:focus {
    outline: none;
    border-color: #d97706;
  }

  .badge {
    display: inline-block;
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 0.75rem;
    font-weight: 600;
  }

  .badge-stock-bajo {
    background: #fee2e2;
    color: #b91c1c;
  }

  .badge-stock-ok {
    background: #dcfce7;
    color: #166534;
  }

  .badge-sin-costo {
    background: #fef3c7;
    color: #92400e;
  }
</style>

</head>

<body class="bg-gray-50 min-h-screen flex flex-col">

<!-- HEADER -->
<header class="bg-gradient-to-r from-blue-600 to-blue-700 text-white p-4 shadow-lg sticky top-0 z-20">
  <div class="flex justify-between items-center">
    <div class="font-bold text-lg flex items-center gap-2">
      <i class="bi bi-box2"></i> Inventario
    </div>

    <a href="index.html" class="bg-white text-blue-600 px-4 py-2 rounded font-bold hover:shadow-lg transition">
      ← Volver
    </a>
  </div>
</header>

<!-- BÚSQUEDA Y FILTROS -->
<div class="bg-white shadow p-4 border-b border-gray-200">
  <div class="flex gap-2 flex-wrap mb-3">
    <input id="searchInventario"
      type="text"
      placeholder="🔍 Buscar producto..."
      class="flex-1 min-w-60 border-2 p-2 rounded font-bold">

    <button id="btnNuevoProducto"
      class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded font-bold flex items-center gap-1">
      <i class="bi bi-plus-circle"></i> Nuevo
    </button>
  </div>

  <div class="flex gap-2 flex-wrap text-sm">
    <button id="filterTodos" class="px-3 py-1 bg-blue-100 text-blue-700 rounded font-bold">
      Todos (0)
    </button>

    <button id="filterBajoStock" class="px-3 py-1 bg-red-100 text-red-700 rounded">
      Bajo Stock
    </button>

    <button id="filterSinCosto" class="px-3 py-1 bg-yellow-100 text-yellow-700 rounded">
      Sin Costo
    </button>
  </div>
</div>

<!-- TABLA -->
<div class="p-4 flex-1">

  <div class="table-responsive bg-white rounded-lg shadow overflow-hidden">

    <table class="w-full text-sm">
      <thead class="bg-gray-100 border-b-2 border-gray-300">
        <tr>
          <th class="px-4 py-3 text-left font-bold">Producto</th>
          <th class="px-4 py-3 text-center font-bold">Stock</th>
          <th class="px-4 py-3 text-right font-bold">Costo</th>
          <th class="px-4 py-3 text-right font-bold">Precio Venta</th>
          <th class="px-4 py-3 text-center font-bold">Ganancia/U</th>
          <th class="px-4 py-3 text-center font-bold">Acciones</th>
        </tr>
      </thead>

      <tbody id="tablaInventario">
        <tr>
          <td colspan="6" class="text-center p-4 text-gray-400">
            Cargando...
          </td>
        </tr>
      </tbody>

    </table>

  </div>
</div>

<!-- STATS -->
<div class="grid grid-cols-2 md:grid-cols-4 gap-3 mt-4 p-4">
  <div class="bg-blue-50 p-3 rounded border-l-4 border-blue-500">
    <p class="text-xs text-gray-600">Total Productos</p>
    <p id="statTotal" class="text-2xl font-bold">0</p>
  </div>

  <div class="bg-yellow-50 p-3 rounded border-l-4 border-yellow-500">
    <p class="text-xs text-gray-600">Bajo Stock</p>
    <p id="statBajo" class="text-2xl font-bold text-red-600">0</p>
  </div>

  <div class="bg-purple-50 p-3 rounded border-l-4 border-purple-500">
    <p class="text-xs text-gray-600">Sin Costo</p>
    <p id="statSinCosto" class="text-2xl font-bold text-yellow-600">0</p>
  </div>

  <div class="bg-green-50 p-3 rounded border-l-4 border-green-500">
    <p class="text-xs text-gray-600">Valor Total Stock</p>
    <p id="statValor" class="text-2xl font-bold text-green-600">$0</p>
  </div>
</div>

<!-- MODALES -->
<dialog id="modalEditar"></dialog>
<dialog id="modalNuevo"></dialog>

<script src="inventario.js"></script>

</body>
</html>
