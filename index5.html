<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>POS Tienda</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#111827">
  
</head>

<body class="bg-gray-100 min-h-screen flex flex-col">

<!-- LOGIN -->
<div id="loginScreen" class="fixed inset-0 bg-black flex items-center justify-center z-50">
  <div class="bg-white p-6 rounded-xl w-72 text-center">
    <h2 class="font-bold mb-3">Acceso</h2>

   <div class="relative">

     
  <input id="pinInput"
    type="password"
    class="border p-2 w-full text-center pr-10"
    placeholder="PIN">

  <button id="togglePin"
    type="button"
    class="absolute right-2 top-2 text-gray-500">
    <i class="bi bi-eye"></i>
  </button>

</div>

    <button id="btnLogin"
      class="bg-blue-600 text-white w-full mt-3 py-2 rounded">
      Entrar
    </button>
  </div>
</div>

<!-- HEADER -->
<header class="flex justify-between items-center bg-blue-600 text-white p-3 shadow">

  <!-- 🧾 Nombre del sistema -->
  <div class="font-bold text-lg">
    APP Punto de venta
  </div>

  <!-- 👤 Usuario actual -->
  <div id="userLabel" class="text-sm opacity-90">
    Sin sesión
  </div>

  <!-- 🧰 Acciones -->
  <div class="flex gap-2">

    <!-- 📲 Instalar app -->
    <button id="btnInstall" class="bg-white text-blue-600 px-3 py-1 rounded text-sm">
      Instalar
    </button>

    <!-- 🚪 Cerrar sesión -->
    <button id="btnLogout" class="bg-red-500 px-3 py-1 rounded text-sm">
      Salir
    </button>

  </div>

</header>

  
<div class="p-4 flex gap-2">
  <button id="btnNuevaVenta"
    class="bg-green-600 text-white px-4 py-2 rounded">
    Nueva venta
  </button>

  <a href="inventario.html"
    class="bg-blue-600 text-white px-4 py-2 rounded">
    Inventario
  </a>
</div>

<!-- VENTAS -->
<div id="listaVentas" class="p-4 grid gap-4"></div>



  <div id="panelGanancias" class="p-4 bg-white shadow rounded m-4 hidden">

  <h2 class="font-bold text-lg mb-2">💰 Ganancias del día</h2>

  <div class="grid grid-cols-2 gap-3 text-sm">

    <div class="bg-gray-100 p-2 rounded">
      <p class="text-gray-500">Ingresos</p>
      <p id="gananciaIngresos" class="font-bold">$0</p>
    </div>

    <div class="bg-gray-100 p-2 rounded">
      <p class="text-gray-500">Ganancia</p>
      <p id="gananciaTotal" class="font-bold text-green-600">$0</p>
    </div>

    <div class="bg-gray-100 p-2 rounded col-span-2">
      <p class="text-gray-500">Ventas</p>
      <p id="gananciaVentas" class="font-bold">0</p>
    </div>

  </div>

</div>
<!-- FOOTER -->

  <div class="p-4 bg-white shadow-inner flex flex-col gap-3">

  <!-- TOTAL -->
  <div class="flex justify-between items-center">
    <div>
      <p class="text-sm text-gray-500">Total del día</p>
      <p id="totalDia" class="text-xl font-bold text-blue-600">$0</p>
    </div>
  </div>

  <!-- BOTONES PDF -->
  <div class="flex gap-2">
    <button id="btnPDF"
      class="bg-black text-white px-4 py-2 rounded text-sm">
      📄 PDF
    </button>

    <button id="btnPDFGlobal"
      class="bg-red-600 text-white px-4 py-2 rounded text-sm font-bold shadow-lg"
      style="display:none;">
      📊 PDF GLOBAL
    </button>
  </div>

</div>

<!-- MODAL -->
<dialog id="modal" class="p-6 rounded-xl w-96 relative">

  <button id="btnCerrar" class="absolute right-3 top-2">✕</button>

  <h2 class="font-bold mb-4">🧾 Nueva Venta</h2>

  <!-- SELECT INTELIGENTE DE PRODUCTOS -->
  <div class="mb-4">
    <label class="block text-sm font-bold mb-2">📦 Producto</label>
    <select id="selectProducto" class="border p-2 w-full rounded">
      <option value="">-- Selecciona o escribe --</option>
    </select>
  </div>

  <!-- INPUT PARA BÚSQUEDA Y ENTRADA MANUAL -->
  <div class="mb-3">
    <label class="block text-sm font-bold mb-2">🔍 Cantidad | Precio</label>
    <input id="inputProducto"
      list="sugerencias"
      class="border p-2 w-full rounded"
      placeholder="Ej: 2 | 10 x 5 | 3kg">

    <datalist id="sugerencias"></datalist>
  </div>

  <p id="preview" class="text-blue-500 text-sm mt-1 p-2 bg-blue-50 rounded"></p>

  <div id="preVenta" class="mt-4 space-y-2 max-h-40 overflow-y-auto"></div>

  <p class="mt-3 font-bold text-lg">Total: <span id="totalVenta" class="text-green-600">$0</span></p>

  <button id="btnFinalizar"
    class="bg-red-500 hover:bg-red-600 text-white w-full mt-4 py-2 rounded font-bold transition">
    ✅ Finalizar venta
  </button>

</dialog>

<script src="app5.js"></script>

</body>
</html>
